<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Scale: Time</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-row">
        <h1><button class="brand-toggle" type="button" id="brandToggle" aria-expanded="true">To Scale: Time</button></h1>
        <span class="subtitle">Build Temporal Intuition</span>
      </div>

      <div class="controls">
        <div class="input-row">
          <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Search eras, periods, events, futures..." autocomplete="off">
            <div class="autocomplete-list" id="acList"></div>
          </div>
          <button class="btn" type="button" data-action="add">Add</button>
          <button class="btn secondary" type="button" data-action="clear">Clear</button>
        </div>
        <div class="chips" id="chips"></div>
        <div class="presets" id="presetControls"></div>
      </div>
    </header>

    <main class="timeline-container" id="timelineContainer">
      <div class="empty">
        <div class="empty-big">Nothing selected yet</div>
        <small>Search above or try a preset.</small>
      </div>
    </main>
    </div>

  <div class="tooltip" id="tooltip"></div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
